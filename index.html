<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Portal - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-link active">Home / Calc</a>
        <a href="info.html" class="nav-link">About BMI</a>
    </nav>

    <main class="container">
        <div class="card">
            <h1>BMI Calculator</h1>
            <p class="subtitle">Enter your details below to calculate your body mass index.</p>
            
            <div class="input-group">
                <label>Age</label>
                <input type="number" id="age" placeholder="e.g. 15">
            </div>

            <div class="input-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="input-group">
                <label>Height (cm)</label>
                <input type="number" id="height" placeholder="Enter height in cm">
            </div>

            <div class="input-group">
                <label>Weight (kg)</label>
                <input type="number" id="weight" placeholder="Enter weight in kg">
            </div>

            <button class="btn-primary" onclick="calculateBMI()">Calculate Now</button>
            
            <div id="result-box" class="result-display" style="display:none;"></div>
        </div>
    </main>

    <footer class="footer">
        <button class="btn-logout" onclick="logout()">Log Out / Exit</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
